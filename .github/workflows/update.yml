name: Update rates

# Runs every weekday at 13:05 UTC - after the US overnight rates publish
# (~08:00 ET). Adjust the cron if you want a different time. You can also run
# it on demand from the Actions tab (workflow_dispatch).
on:
  schedule:
    - cron: "5 13 * * 1-5"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch rates
        run: python fetch_rates.py

      - name: Commit updated data
        run: |
          git config user.name "rates-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/rates.json data/history.csv
          git diff --quiet --staged || git commit -m "Update rates $(date -u +%FT%TZ)"
          git push
